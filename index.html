<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Goalie Save Tracker</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Goalie Save Tracker</h1>
      <p>Track saves and goals by game for Club, JV, and Varsity seasons.</p>
      <small class="update-note">Latest update: bigger quick buttons + auto-save on every change.</small>
      <button id="toggleSeasonViewBtn" type="button" class="secondary-btn">Show Season View</button>
    </header>

    <main>
      <section class="card">
        <h2>Add Game</h2>
        <form id="gameForm" class="stack">
          <div class="grid">
            <label>
              Date
              <input id="gameDate" type="date" required />
            </label>
            <label>
              Season
              <input id="season" type="number" min="2000" max="2100" required />
            </label>
            <label>
              Team Level
              <select id="teamLevel" required>
                <option value="Club">Club</option>
                <option value="JV">JV</option>
                <option value="Varsity">Varsity</option>
              </select>
            </label>
            <label>
              Opponent
              <input id="opponent" required placeholder="e.g. West High" />
            </label>
            <label>
              Saves
              <input id="saves" type="number" min="0" required placeholder="0" />
            </label>
            <label>
              Goals Allowed
              <input id="goalsAllowed" type="number" min="0" required placeholder="0" />
            </label>
            <label>
              PK Saves
              <input id="pkSaves" type="number" min="0" required placeholder="0" />
            </label>
          </div>

          <div class="quick-buttons">
            <button type="button" class="save-btn" data-inc="saves">+1 Save</button>
            <button type="button" class="goal-btn" data-inc="goalsAllowed">+1 Goal</button>
            <button type="button" data-inc="pkSaves">+1 PK Save</button>
          </div>

          <label>
            Notes (optional)
            <textarea id="notes" rows="3" placeholder="Weather, PK saves, etc."></textarea>
          </label>

          <div id="formStatus" role="status" class="status"></div>
          <button type="submit">Save Game</button>
        </form>
      </section>

      <section id="seasonView" class="card hidden">
        <h2>Season View</h2>
        <div class="grid filter-grid">
          <label>
            Season
            <select id="seasonFilter"></select>
          </label>
          <label>
            Team Level
            <select id="levelFilter">
              <option value="all">All</option>
              <option value="Club">Club</option>
              <option value="JV">JV</option>
              <option value="Varsity">Varsity</option>
            </select>
          </label>
        </div>

        <div id="summary" class="summary"></div>
      </section>

      <section class="card">
        <h2>Games</h2>
        <div id="gameList" class="game-list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
